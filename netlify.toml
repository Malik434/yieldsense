[build]
  # Stay in frontend/ so @netlify/plugin-nextjs can locate the Next.js project
  # and publish = ".next" resolves to frontend/.next correctly.
  base    = "frontend"
  # Build sequence:
  #   1. cd ..        → repo root (/opt/build/repo/)
  #   2. npm ci       → install root devDependencies (webpack, ts-loader, typescript)
  #   3. build:embed  → webpack compiles processor bundle, embedProcessor.cjs writes
  #                     frontend/src/lib/processorBundle.ts
  #   4. cd frontend  → back to Next.js project root
  #   5. npm run build→ prebuild re-runs embedProcessor.cjs (fast, idempotent),
  #                     then next build compiles the full site
  command = "cd .. && npm ci && npm run build:embed && cd frontend && npm run build"
  publish = ".next"

[build.environment]
  # Node 20 LTS (Iron) is required by Next.js 16 (>=20.9.0) and webpack-cli 7.
  # Note: "18" was previously set for Acurast CLI local dev — that is a separate
  # concern from this Netlify build, which only runs webpack + next build.
  # The Acurast CLI is never invoked during the Netlify pipeline.
  NODE_VERSION = "20.11.1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
